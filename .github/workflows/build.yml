name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npx next build
      - run: npx electron-builder --linux AppImage deb rpm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.rpm

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npx next build
      - run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: desktop/dist/*.exe

  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - run: npx next build
      - run: npx electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: desktop/dist/*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: linux-builds
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: windows-builds
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: mac-builds
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: "Release ${{ github.ref_name }} — notes incoming..."
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.exe
            dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Write release notes for Noteriv ${{ github.ref_name }}.

            Run `git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD` to see commits since last release.

            Format with emoji headers and bullet points. Only include sections that apply:
            ✨ Features, 🐛 Bug Fixes, 🔧 Improvements.
            Write for end users — no commit hashes, no jargon. Keep it concise.

            Then update the release with: `gh release edit ${{ github.ref_name }} --notes "YOUR_NOTES_HERE"`
          claude_args: '--allowed-tools "Bash(git log:*),Bash(git describe:*),Bash(gh release edit:*)"'
